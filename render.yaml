services:
  - type: web
    name: batel-api
    env: node
    rootDir: .
    plan: starter
    buildCommand: npm ci && npm --workspace backend run prisma:generate && npm --workspace backend run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: batel-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GOOGLE_ALLOWED_EMAILS
        sync: false
      - key: GOOGLE_ALLOWED_DOMAIN
        sync: false
      - key: GOOGLE_DEFAULT_ROLE
        value: admin
